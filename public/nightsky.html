<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050816" />
  <title>SkyScope — Night Sky View</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/nightsky.css" />

  <!-- D3-Celestial: renders stars, constellations, and the Milky Way band.
       (Planets are NOT rendered by d3-celestial here — its planets module
       proved unreliable after extensive testing. Planets are instead
       calculated independently below using astronomy-engine and drawn
       as a custom overlay on top of this chart.) -->
  <script src="https://cdn.jsdelivr.net/npm/d3-celestial@0.7.35/lib/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-celestial@0.7.35/celestial.min.js"></script>

  <!-- Astronomy Engine: NASA/JPL-grade Sun/Moon/planet position calculator.
       Runs entirely client-side, no API key, no signup, no network call. -->
  <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2/astronomy.browser.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div id="starfield"></div>

  <header class="dash-header">
    <div class="logo small"><i data-lucide="sparkles" class="icon-inline"></i> SkyScope — Night Sky View</div>
    <div class="location-display" id="nightSkyLocationDisplay"><i data-lucide="map-pin" class="icon-xs"></i> Loading...</div>
    <a href="index.html" class="icon-btn"><i data-lucide="arrow-left" class="icon-xs"></i> Back to Dashboard</a>
  </header>

  <div class="nightsky-body">
    <!-- Left: controls + legend -->
    <aside class="panel nightsky-panel">
      <h3><i data-lucide="settings-2" class="icon-xs"></i> Sky Settings</h3>

      <div class="info-row">
        <span><i data-lucide="clock" class="icon-xs"></i> Date / Time</span>
        <strong id="nightSkyTime">--</strong>
      </div>
      <div class="info-row">
        <span><i data-lucide="move-vertical" class="icon-xs"></i> Latitude</span>
        <strong id="nightSkyLat">--</strong>
      </div>
      <div class="info-row">
        <span><i data-lucide="move-horizontal" class="icon-xs"></i> Longitude</span>
        <strong id="nightSkyLng">--</strong>
      </div>

      <h3><i data-lucide="sliders-horizontal" class="icon-xs"></i> Display Options</h3>
      <label class="toggle-row">
        <input type="checkbox" id="toggleConstellationLines" checked />
        <span>Constellation Lines</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="toggleConstellationNames" checked />
        <span>Constellation Names</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="togglePlanets" checked />
        <span>Planets</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="toggleMilkyWay" checked />
        <span>Milky Way Band</span>
      </label>

      <h3><i data-lucide="info" class="icon-xs"></i> Legend</h3>
      <div class="legend-item"><span class="legend-dot sun"></span> Sun</div>
      <div class="legend-item"><span class="legend-dot moon"></span> Moon</div>
      <div class="legend-item"><span class="legend-dot planet"></span> Planet</div>
      <div class="legend-item"><span class="legend-line"></span> Constellation line</div>
    </aside>

    <!-- Center: the celestial chart -->
    <main class="nightsky-chart-container">
      <div class="globe-overlay-top">
        <span id="chartLiveIndicator">LIVE SKY VIEW</span>
        <span id="chartUpdated">Rendering...</span>
      </div>
      <div id="celestial-map"></div>
      <!-- Custom planet overlay, drawn independently via astronomy-engine -->
      <svg id="planetOverlay" class="planet-overlay"></svg>
    </main>

    <!-- Right: currently visible objects list -->
    <aside class="panel nightsky-panel">
      <h3><i data-lucide="telescope" class="icon-xs"></i> Visible Tonight</h3>
      <ul id="visibleObjectsList" class="satellite-list">
        <li class="loading-item"><span class="data-loading"></span> Calculating sky positions...</li>
      </ul>
    </aside>
  </div>

  <script src="js/starfield.js"></script>
  <script src="js/nightsky.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => { lucide.createIcons(); });
  </script>
</body>
</html>
